name: Update Dependencies

on:
  schedule:
    # every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # can be run manually

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: 'pnpm'
        cache-dependency-path: |
          pnpm-lock.yaml
          packages/react/pnpm-lock.yaml
        
    - name: Configure git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
    - name: Create and switch to dependency branch
      run: |
        git checkout -b "dependency-update-$(date +%Y%m%d)"
        
    - name: Install dependencies
      run: |
        pnpm install --frozen-lockfile
        pnpm --dir packages/react install --frozen-lockfile
        
    - name: Update all dependencies
      run: |
        pnpm update --latest
        pnpm --dir packages/react update --latest
        
    - name: Install updated dependencies
      run: |
        pnpm install
        pnpm --dir packages/react install
        sudo pnpm exec playwright install-deps
        pnpm exec playwright install
        pnpm --dir packages/react exec playwright install
        
    - name: Run tests
      run: |
        pnpm run coverage:ci
        pnpm --dir packages/react test
        
    - name: Check if there are changes
      id: check_changes
      run: |
        if git diff --quiet; then
          echo "changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "changes=true" >> "$GITHUB_OUTPUT"
        fi
        
    - name: Commit changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git add .
        git commit -m "chore(deps-dev): update dependency
        
        update dependencies to the latest"
        
    - name: Push dependency branch
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git push origin HEAD --force-with-lease
        
    - name: Create Pull Request
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        gh pr create \
          --title "chore(deps-dev): update dependencies" \
          --body "Automated dependency updates to the latest versions.
        
        This PR contains the following changes:
        - Updated all dependencies to their latest compatible versions
        - All tests are passing
        
        Please review and merge if everything looks good." \
          --base master \
          --head "dependency-update-$(date +%Y%m%d)" \
          --label "chore,dependencies,dev-env"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: No changes found
      if: steps.check_changes.outputs.changes == 'false'
      run: |
        echo "No dependency updates available"
        git checkout master
        git branch -D "dependency-update-$(date +%Y%m%d)"
